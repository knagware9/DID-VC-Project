services:
  # Local Besu-compatible dev chain (Hardhat node — instant mining, EVM-compatible)
  # For a real Hyperledger Besu network: set BESU_RPC_URL in .env to your Besu node
  besu:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "npm install --ignore-scripts 2>/dev/null; npx hardhat node --hostname 0.0.0.0 --port 8545"
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --post-data='{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' --header='Content-Type: application/json' http://localhost:8545 2>/dev/null | grep -q result"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: didvc
      POSTGRES_USER: didvc_user
      POSTGRES_PASSWORD: didvc_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U didvc_user -d didvc"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://didvc_user:didvc_pass@postgres:5432/didvc
      - BESU_NETWORK=${BESU_NETWORK:-dev}
      - BESU_RPC_URL=${BESU_RPC_URL:-http://besu:8545}
      - BESU_PRIVATE_KEY=${BESU_PRIVATE_KEY:-}
      - BESU_EXPLORER_URL=${BESU_EXPLORER_URL:-}
      - DID_REGISTRY_ADDRESS=${DID_REGISTRY_ADDRESS:-}
      - VC_REGISTRY_ADDRESS=${VC_REGISTRY_ADDRESS:-}
    depends_on:
      postgres:
        condition: service_healthy
      besu:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
