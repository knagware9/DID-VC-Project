services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: didvc
      POSTGRES_USER: didvc_user
      POSTGRES_PASSWORD: didvc_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U didvc_user -d didvc"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://didvc_user:didvc_pass@postgres:5432/didvc
      - POLYGON_NETWORK=${POLYGON_NETWORK:-amoy}
      - POLYGON_RPC_URL=${POLYGON_RPC_URL:-https://rpc-amoy.polygon.technology}
      - POLYGON_PRIVATE_KEY=${POLYGON_PRIVATE_KEY:-}
      - DID_REGISTRY_ADDRESS=${DID_REGISTRY_ADDRESS:-}
      - VC_REGISTRY_ADDRESS=${VC_REGISTRY_ADDRESS:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
